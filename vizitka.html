<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Марга АСТ — Внедрение ИИ</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #07223d;
      --crimson: #8C2E47;
      --orange:  #F28241;
    }

    body {
      background: var(--bg);
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow-y: auto;
      position: relative;
    }

    /* ── Canvas: flow field ── */
    #bg-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }

    /* ── Corner brackets ── */
    .corner {
      position: fixed;
      width: 30px; height: 30px;
      pointer-events: none; z-index: 2;
      border-style: solid;
    }
    .corner.tl { top: 22px; left: 22px;
      border-color: rgba(242,130,65,.28); border-width: 1.5px 0 0 1.5px; }
    .corner.tr { top: 22px; right: 22px;
      border-color: rgba(242,130,65,.28); border-width: 1.5px 1.5px 0 0; }
    .corner.bl { bottom: 22px; left: 22px;
      border-color: rgba(140,46,71,.28); border-width: 0 0 1.5px 1.5px; }
    .corner.br { bottom: 22px; right: 22px;
      border-color: rgba(140,46,71,.28); border-width: 0 1.5px 1.5px 0; }

    /* ── Structural ring ── */
    .ring-deco {
      position: fixed;
      top: -170px; right: -170px;
      width: 460px; height: 460px;
      border-radius: 50%;
      border: 1px solid rgba(242,130,65,.06);
      pointer-events: none; z-index: 1;
    }
    .ring-deco::before {
      content: '';
      position: absolute; inset: 55px;
      border-radius: 50%;
      border: 1px dashed rgba(140,46,71,.07);
    }
    .ring-deco::after {
      content: '';
      position: absolute; inset: 115px;
      border-radius: 50%;
      border: 1px solid rgba(242,130,65,.04);
    }

    /* ── Hero section ── */
    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      padding: 5rem 1rem 2.5rem;
    }

    /* ── Main card ── */
    .card {
      position: relative;
      z-index: 10;
      width: min(480px, 92vw);
      padding: clamp(2rem, 5vw, 3rem) clamp(1.5rem, 5vw, 2.8rem) clamp(1.2rem, 4vw, 3rem);
      background: rgba(4,18,36,.40);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 4px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      text-align: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.05), 0 32px 80px rgba(0,0,0,.45);
      animation: card-in .85s cubic-bezier(.34,1.56,.64,1) both;
    }
    .card::before {
      content: '';
      position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(135deg,
        rgba(242,130,65,.1) 0%, transparent 45%,
        transparent 55%, rgba(140,46,71,.08) 100%);
      pointer-events: none; z-index: -1;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(32px) scale(.94); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Avatar ── */
    .avatar-wrap {
      width: 90px; height: 90px;
      margin: 0 auto 1.6rem;
      animation: pop-in .65s cubic-bezier(.34,1.56,.64,1) .18s both;
    }
    .avatar-ring {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: rgba(7,34,61,.9);
      border: 3px solid rgba(242,130,65,.55);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .avatar-ring::before {
      content: '';
      position: absolute; inset: 6px;
      border-radius: 50%;
      border: 1px solid rgba(140,46,71,.3);
      pointer-events: none;
    }
    @keyframes pop-in {
      from { opacity: 0; transform: scale(.3) rotate(-25deg); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Name ── */
    .name {
      font-size: clamp(2.5rem, 7.5vw, 4rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -1px;
      background: linear-gradient(130deg, #F28241 0%, #d4686a 52%, #8C2E47 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 16px rgba(242,130,65,.28));
      margin-bottom: 1.4rem;
      animation: fade-up .65s ease .32s both;
    }

    /* ── Spec ── */
    .spec {
      color: rgba(255,255,255,.6);
      font-size: clamp(.84rem, 2.4vw, .96rem);
      font-weight: 300;
      letter-spacing: .04em;
      line-height: 1.75;
      margin-bottom: 1.8rem;
      animation: fade-up .65s ease .46s both;
    }
    .spec strong { color: var(--orange); font-weight: 600; }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: .8rem;
      margin: 0 0 1.8rem;
      animation: fade-up .65s ease .54s both;
    }
    .div-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(242,130,65,.32), transparent);
    }
    .div-diamond {
      width: 6px; height: 6px;
      background: var(--orange);
      transform: rotate(45deg);
      flex-shrink: 0; opacity: .6;
    }

    /* ── Social icons ── */
    .socials {
      display: flex; gap: .9rem;
      justify-content: center;
      margin-bottom: 0;
      animation: fade-up .65s ease .64s both;
    }
    .social-link {
      display: flex; align-items: center; justify-content: center;
      width: 52px; height: 52px;
      border-radius: 3px;
      border: 1px solid rgba(242,130,65,.2);
      background: rgba(255,255,255,.03);
      color: rgba(255,255,255,.62);
      text-decoration: none;
      position: relative; overflow: hidden;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1),
                  box-shadow .3s, border-color .3s, background .3s, color .3s;
    }
    .social-link::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--crimson), var(--orange));
      transform: scaleX(0); transform-origin: left;
      transition: transform .35s ease;
    }
    .social-link:hover {
      transform: translateY(-6px);
      border-color: rgba(242,130,65,.5);
      background: rgba(242,130,65,.07);
      box-shadow: 0 12px 28px rgba(0,0,0,.3), 0 0 0 1px rgba(242,130,65,.15);
      color: #fff;
    }
    .social-link:hover::after { transform: scaleX(1); }
    .social-link svg {
      width: 22px; height: 22px; fill: currentColor;
      transition: transform .3s ease; position: relative; z-index: 1;
    }
    .social-link:hover svg { transform: scale(1.12); }

    /* ── CTA button ── */
    .cta {
      display: inline-flex; align-items: center; gap: .55rem;
      padding: .88rem 2.1rem;
      border-radius: 3px;
      border: none;
      background: linear-gradient(135deg, #F28241 0%, #b83a5e 100%);
      color: #07223d;
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-size: .84rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      position: relative; overflow: hidden; cursor: pointer;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s;
    }
    .cta:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(140,46,71,.45);
    }
    .cta > * { position: relative; z-index: 1; }
    .cta svg { width: 15px; height: 15px; fill: currentColor; }

    /* Ripple */
    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,.2);
      transform: scale(0); pointer-events: none;
      animation: ripple-out .7s ease-out forwards;
    }
    @keyframes ripple-out { to { transform: scale(7); opacity: 0; } }

    /* ── Benefits section ── */
    .benefits-section {
      position: relative; z-index: 5;
      width: min(480px, 92vw);
      margin: 0 auto;
      padding: 0 1rem 4rem;
    }

    .b-section-label {
      text-align: center;
      font-size: .82rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(242,130,65,.6);
      margin-bottom: 1.2rem;
    }

    .b-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: .55rem;
    }

    .b-card {
      --accent: var(--orange);
      padding: .85rem 1.1rem;
      background: rgba(4,18,36,.16);
      border: 1px solid rgba(255,255,255,.07);
      border-left: 2px solid var(--accent);
      border-radius: 4px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: .85rem;
      transition: background .3s, box-shadow .3s, transform .3s;
      opacity: 0;
      animation: b-in .55s cubic-bezier(.34,1.56,.64,1) both paused;
      cursor: pointer;
    }
    .b-card:nth-child(even) { --accent: var(--crimson); }
    .b-card:hover {
      background: rgba(4,18,36,.28);
      box-shadow: 0 6px 24px rgba(0,0,0,.24);
    }
    @keyframes b-in {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: none; }
    }

    .b-icon {
      width: 20px; height: 20px;
      color: var(--accent);
      flex-shrink: 0;
    }
    .b-icon svg { width: 100%; height: 100%; }

    .b-title {
      font-size: .88rem;
      font-weight: 700;
      color: rgba(255,255,255,.88);
      letter-spacing: .01em;
      flex: 1;
    }

    .b-btn {
      background: none; border: none;
      color: var(--accent);
      font-size: 1.1rem;
      line-height: 1;
      cursor: pointer; padding: .1rem .2rem;
      flex-shrink: 0;
      opacity: .65;
      transition: opacity .2s, transform .2s;
    }
    .b-btn:hover { opacity: 1; transform: translateX(3px); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(4,18,32,.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity .3s ease;
    }
    .modal-overlay.open {
      opacity: 1; pointer-events: all;
    }
    .modal-box {
      position: relative;
      width: min(480px, 90vw);
      padding: 2.2rem 2rem 2rem;
      background: rgba(7,34,61,.97);
      border: 1px solid rgba(242,130,65,.2);
      border-radius: 4px;
      box-shadow: 0 24px 80px rgba(0,0,0,.55);
      transform: translateY(20px) scale(.96);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
    }
    .modal-overlay.open .modal-box { transform: none; }

    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none;
      color: rgba(255,255,255,.35);
      font-size: 1.3rem; line-height: 1;
      cursor: pointer; padding: .3rem;
      transition: color .2s;
    }
    .modal-close:hover { color: var(--orange); }

    .modal-icon {
      width: 34px; height: 34px;
      color: var(--orange);
      margin-bottom: 1rem;
    }
    .modal-icon svg { width: 100%; height: 100%; }

    .modal-title {
      font-size: 1.05rem; font-weight: 800;
      color: rgba(255,255,255,.92);
      margin-bottom: 1.1rem;
      letter-spacing: -.01em;
    }
    .modal-text {
      font-size: .86rem; font-weight: 300;
      color: rgba(255,255,255,.6);
      line-height: 1.85;
      white-space: pre-line;
    }

    /* ── Shared ── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: none; }
    }

    @media (max-width: 600px) {
      .corner { display: none; }
    }
    @media (max-width: 420px) {
      .card { padding: 1.7rem 1.1rem; }
    }
  </style>
</head>

  <script>
    // ── Flow field ─────────────────────────────────────────────────────
    const canvas = document.getElementById('bg-canvas');
    const ctx    = canvas.getContext('2d');

    let W, H, time = 0;
    const N     = 1000;
    const SPEED = 1.35;

    const px = new Float32Array(N);
    const py = new Float32Array(N);
    const pl = new Float32Array(N);
    const pm = new Float32Array(N);
    const pc = new Uint8Array(N);

    function resetParticle(i) {
      px[i] = Math.random() * W;
      py[i] = Math.random() * H;
      pl[i] = 0;
      pm[i] = 160 + Math.random() * 220;
      pc[i] = Math.random() < .38 ? 0 : 1;
    }

    function init() {
      const dpr = window.devicePixelRatio || 1;
      W = innerWidth;
      H = innerHeight;
      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.fillStyle = '#07223d';
      ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < N; i++) { resetParticle(i); pl[i] = Math.random() * pm[i]; }
    }
    window.addEventListener('resize', init);
    init();

    function field(x, y) {
      const s = 0.0026;
      const ax = -W * 0.13, ay = H * 0.30;
      const dax = x - ax, day = y - ay;
      const distA = Math.sqrt(dax*dax + day*day) + 1;
      const angA  = Math.atan2(day, dax) + Math.PI * 0.5
                  + Math.log(distA * 0.007 + 0.1) * 0.85 + time * 0.050;
      const bx = W * 1.13, by = H * 0.70;
      const dbx = x - bx, dby = y - by;
      const distB = Math.sqrt(dbx*dbx + dby*dby) + 1;
      const angB  = Math.atan2(dby, dbx) - Math.PI * 0.5
                  - Math.log(distB * 0.007 + 0.1) * 0.72 - time * 0.038;
      const wA = 1/(distA+260), wB = 1/(distB+260);
      const base = (angA*wA + angB*wB) / (wA+wB);
      return base
        + Math.sin(x*s       + y*s*.7  + time*.09) * .38
        + Math.sin(x*s*1.8   - y*s*1.3 + time*.07) * .22
        + Math.cos(x*s*.9    + y*s*1.6 - time*.05) * .15
        + Math.sin((x+y)*s*.6           + time*.04) * .12;
    }

    const COLORS = [[75,148,218],[125,192,245]];

    const START = performance.now();

    function tick(now) {
      if (now - START > 10000) return;
      ctx.fillStyle = 'rgba(7,34,61,0.010)';
      ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < N; i++) {
        const angle = field(px[i], py[i]);
        const nx = px[i] + Math.cos(angle) * SPEED;
        const ny = py[i] + Math.sin(angle) * SPEED;
        const ratio = pl[i] / pm[i];
        const la = ratio < .08 ? ratio/.08 : ratio > .88 ? (1-ratio)/.12 : 1;
        const [r,g,b] = COLORS[pc[i]];
        const ba = pc[i]===0 ? .038 : .026;
        ctx.strokeStyle = `rgba(${r},${g},${b},${(la*ba).toFixed(4)})`;
        ctx.lineWidth = 1.0;
        ctx.beginPath(); ctx.moveTo(px[i],py[i]); ctx.lineTo(nx,ny); ctx.stroke();
        px[i]=nx; py[i]=ny; pl[i]++;
        if (pl[i]>=pm[i]||nx<-2||nx>W+2||ny<-2||ny>H+2) resetParticle(i);
      }
      time += 0.0022;
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // ── CTA ripple ──
    document.getElementById('cta-btn').addEventListener('click', function(e) {
      const s = document.createElement('span');
      s.className = 'ripple';
      const rect = this.getBoundingClientRect(), sz = Math.max(rect.width, rect.height);
      s.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX-rect.left-sz/2}px;top:${e.clientY-rect.top-sz/2}px`;
      this.appendChild(s);
      s.addEventListener('animationend', () => s.remove());
    });

    // ── Benefits scroll animation ──
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.style.animationPlayState = 'running';
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });

    document.querySelectorAll('.b-card').forEach((card, i) => {
      card.style.animationDelay = `${i * 0.1}s`;
      observer.observe(card);
    });

    // ── Modal ──
    const BENEFITS = [
      {
        title: 'Не точечно — системно',
        text: `Большинство компаний тратят ресурсы на отдельные ИИ-инструменты, которые никак не связаны между собой. Это как купить оборудование без завода.\n\nЯ проектирую ИИ-инфраструктуру целиком: аудит процессов → карта точек внедрения → подбор инструментов → интеграция → обучение команды.\n\nКаждый шаг ведёт к измеримому бизнес-результату, а не к красивым слайдам.`
      },
      {
        title: 'Только то, что окупается',
        text: `90% ИИ-инструментов на рынке вам не нужны. Модные решения ≠ нужные решения.\n\nПеред каждым внедрением — анализ: какой процесс автоматизируем, сколько это стоит сейчас, сколько сэкономим или заработаем дополнительно.\n\nБез этой математики проект не начинается. Только понятный ROI — и только потом внедрение.`
      },
      {
        title: 'Результат через 2 недели',
        text: `Классический консалтинг работает медленно: полгода на анализ, ещё полгода на внедрение. Мой подход — итерационный.\n\nПервый работающий прототип вы видите через 2 недели. Тестируем, замеряем, масштабируем только то, что работает.\n\nСкорость — это не торопливость. Это правильно выстроенный процесс, в котором каждый шаг проверяется реальными данными.`
      },
      {
        title: 'Эффект без зависимости',
        text: `Внедрённый инструмент, которым никто не умеет пользоваться — мёртвый актив.\n\nКаждый проект заканчивается не передачей кода, а передачей знаний: обучение команды, документация процессов, метрики для самостоятельного контроля.\n\nВы получаете не инструмент — а новую компетенцию внутри бизнеса. Эффект остаётся, когда я ухожу.`
      }
    ];

    const MODAL_ICONS = [
      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="5" r="2.5"/><circle cx="5" cy="18" r="2.5"/><circle cx="19" cy="18" r="2.5"/><line x1="12" y1="7.5" x2="6.5" y2="15.5"/><line x1="12" y1="7.5" x2="17.5" y2="15.5"/><line x1="7.5" y1="18" x2="16.5" y2="18"/></svg>`,
      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,17 8,11 13,14 21,6"/><polyline points="17,6 21,6 21,10"/></svg>`,
      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="13,2 7,13 12,13 11,22 17,11 12,11"/></svg>`,
      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11 4.5-.85 8-5.75 8-11V6L12 2z"/><polyline points="9,12 11,14 15,10"/></svg>`
    ];

    const overlay    = document.getElementById('modal-overlay');
    const modalIcon  = document.getElementById('modal-icon');
    const modalTitle = document.getElementById('modal-title');
    const modalText  = document.getElementById('modal-text');

    document.querySelectorAll('.b-card').forEach((card, i) => {
      card.addEventListener('click', () => {
        modalIcon.innerHTML  = MODAL_ICONS[i];
        modalTitle.textContent = BENEFITS[i].title;
        modalText.textContent  = BENEFITS[i].text;
        modalIcon.style.color = i % 2 === 0 ? 'var(--orange)' : 'var(--crimson)';
        overlay.classList.add('open');
      });
    });

    document.getElementById('modal-close').addEventListener('click', () => overlay.classList.remove('open'));
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') overlay.classList.remove('open'); });
  </script>
</body>
</html>
